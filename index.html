<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* iOS standalone (home screen app) — respect safe areas, hide overscroll */
  html { background: var(--cream); }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; overscroll-behavior-y: none; }
  @media (display-mode: standalone) {
    /* Add a touch more breathing room when launched from home screen */
    .container { padding-top: 1rem; }
  }
  /* Prevent iOS zoom on input focus */
  input, button, select, textarea { font-size: 16px; }

  :root {
    --cream: #fdf6ec;
    --cream-dark: #f5e6d3;
    --terracotta: #c8602b;
    --terracotta-dark: #b8460e;
    --olive: #5c8a3a;
    --olive-light: #a8c882;
    --gold: #e8841a;
    --brown-dark: #3d1c00;
    --brown: #5c2e0d;
    --brown-mid: #6b4423;
    --tan: #8b5e3c;
    --tan-soft: #d4a574;
    --border: #e8d5b7;
    --border-soft: #f0e0c8;
    --white: #fff;
    --warm-white: #fff8ec;
    --green-bg: #f0f7e8;
  }
  html, body { font-family: 'Inter', system-ui, sans-serif; color: var(--brown-dark); background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 100%); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .serif { font-family: 'Fraunces', serif; }
  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }
  @media (min-width: 640px) { .container { padding: 2.5rem 1.5rem; } }

  /* Header */
  header { margin-bottom: 1.75rem; }
  h1.title { font-family: 'Fraunces', serif; font-weight: 800; font-size: clamp(2rem, 6vw, 3rem); color: var(--brown-dark); letter-spacing: -0.02em; line-height: 1; }
  .subtitle { font-family: 'Fraunces', serif; font-style: italic; color: var(--tan); font-size: 0.95rem; }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
  header p.tagline { margin-top: 0.5rem; color: var(--brown-mid); font-size: 0.9rem; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
  @media (min-width: 900px) { .stat-grid { grid-template-columns: repeat(4, 1fr); gap: 1rem; } }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; box-shadow: 0 4px 20px rgba(92, 46, 13, 0.05); }
  .stat-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--brown-mid); font-weight: 500; margin-bottom: 0.5rem; }
  .stat-label svg { width: 16px; height: 16px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 700; color: var(--brown-dark); line-height: 1.05; }
  .stat-sub { font-size: 0.72rem; color: var(--tan); margin-top: 0.25rem; }
  .accent-terra { color: var(--terracotta); }
  .accent-olive { color: var(--olive); }
  .accent-tan { color: var(--tan); }
  .accent-fire { color: var(--terracotta-dark); }

  /* Progress bar */
  .progress-card { padding: 1rem 1.25rem; border-radius: 1rem; background: var(--warm-white); border: 1px solid var(--border); margin-bottom: 1.75rem; }
  .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
  .progress-bar { height: 10px; background: var(--border-soft); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--terracotta) 0%, var(--gold) 100%); border-radius: 999px; transition: width 0.6s ease; }
  .progress-bounds { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--tan); margin-top: 0.5rem; }

  /* Tabs */
  .tabs { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 0.25rem; }
  .tab-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1rem; border-radius: 0.5rem; white-space: nowrap; transition: all 0.15s; font-size: 0.875rem; font-family: inherit; font-weight: 500; cursor: pointer; background: var(--warm-white); color: var(--brown); border: 1px solid var(--border); }
  .tab-btn svg { width: 16px; height: 16px; }
  .tab-btn.active { background: var(--brown-dark); color: var(--cream); border-color: var(--brown-dark); }
  .tab-btn:hover:not(.active) { background: var(--cream-dark); }

  /* Cards */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 1rem; padding: 1.25rem; box-shadow: 0 4px 20px rgba(92, 46, 13, 0.05); margin-bottom: 1.25rem; }
  @media (min-width: 640px) { .card { padding: 1.5rem; } }
  .card h2 { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 600; color: var(--brown-dark); margin-bottom: 0.5rem; }
  .card-header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
  .pill { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 999px; background: var(--cream-dark); color: var(--brown-mid); }

  /* Meal count selector */
  .meal-count-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
  .count-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--cream); color: var(--brown); font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; flex: 1; min-width: 80px; }
  .count-btn:hover { background: var(--cream-dark); }
  .count-btn.active { background: var(--terracotta); color: white; border-color: var(--terracotta); }
  .count-meta { font-size: 0.8rem; color: var(--tan); margin-bottom: 1rem; }
  .actions-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; margin-bottom: 1rem; }

  /* Meal items */
  .meal-list { display: flex; flex-direction: column; gap: 0.65rem; }
  .meal-item { display: flex; align-items: stretch; gap: 0.75rem; padding: 0.875rem; border-radius: 0.75rem; background: var(--cream); border: 1px solid var(--border); transition: all 0.2s; }
  .meal-item.done { background: var(--green-bg); border-color: var(--olive-light); opacity: 0.85; }
  .meal-check { background: none; border: none; cursor: pointer; padding: 0; color: var(--terracotta); flex-shrink: 0; align-self: flex-start; padding-top: 2px; }
  .meal-item.done .meal-check { color: var(--olive); }
  .meal-check svg { width: 22px; height: 22px; }
  .meal-body { flex: 1; min-width: 0; }
  .meal-row1 { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
  .meal-name { font-family: 'Fraunces', serif; font-weight: 600; color: var(--brown-dark); font-size: 1rem; }
  .meal-meta { font-size: 0.72rem; color: var(--tan); font-weight: 500; }
  .meal-dish { font-size: 0.875rem; color: #5c4030; margin-top: 0.25rem; line-height: 1.5; }
  .meal-item.done .meal-dish { text-decoration: line-through; }
  .meal-shuffle { background: none; border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.4rem 0.6rem; cursor: pointer; color: var(--tan); font-family: inherit; display: flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; align-self: flex-start; transition: all 0.15s; flex-shrink: 0; }
  .meal-shuffle:hover { background: var(--cream-dark); color: var(--terracotta); border-color: var(--terracotta); }
  .meal-shuffle svg { width: 14px; height: 14px; }

  /* Buttons */
  .btn { padding: 0.55rem 1.1rem; border-radius: 0.5rem; border: none; cursor: pointer; font-family: inherit; font-weight: 500; font-size: 0.875rem; display: inline-flex; align-items: center; gap: 0.4rem; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.9; }
  .btn-primary { background: var(--terracotta); color: white; }
  .btn-secondary { background: var(--brown-dark); color: var(--cream); }
  .btn-ghost { background: var(--cream-dark); color: var(--brown); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--cream); }
  .btn-danger { background: var(--terracotta-dark); color: white; }
  .btn-danger:hover { opacity: 0.9; }

  /* Partial meal completion */
  .meal-item.partial { background: #fdf3e0; border-color: #e8b86a; opacity: 0.95; }
  .meal-item.partial .meal-check { color: var(--gold); }
  .meal-item.partial .meal-dish { text-decoration: none; color: #6b4423; }
  .meal-partial-tag { display: inline-block; margin-left: 0.4rem; font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 999px; background: var(--gold); color: var(--white-warm); font-weight: 600; letter-spacing: 0.02em; }
  .meal-hint { font-size: 0.72rem; color: var(--tan); margin-top: 0.5rem; line-height: 1.5; }

  /* Meal library (Meals tab) */
  .pool-card { padding: 0; }
  .pool-card > summary { list-style: none; padding: 1rem 1.25rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; background: var(--cream); border-radius: 1rem; }
  .pool-card[open] > summary { border-radius: 1rem 1rem 0 0; border-bottom: 1px solid var(--border); }
  .pool-card > summary::-webkit-details-marker { display: none; }
  .pool-content { padding: 1rem 1.25rem 1.25rem; }
  .meal-library { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.75rem; }
  .library-row { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.65rem 0.75rem; background: var(--cream); border: 1px solid var(--border); border-radius: 0.5rem; }
  .library-row.hidden-meal { opacity: 0.45; background: transparent; }
  .lib-content { flex: 1; min-width: 0; }
  .lib-dish { font-size: 0.875rem; color: #5c4030; line-height: 1.5; }
  .lib-cal { font-size: 0.7rem; color: var(--tan); margin-top: 0.2rem; }
  .lib-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }
  .lib-btn { background: none; border: 1px solid transparent; border-radius: 0.4rem; padding: 0.35rem; cursor: pointer; color: var(--tan); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .lib-btn svg { width: 16px; height: 16px; }

// ---- Storage abstraction (works in Claude artifact via window.storage, falls back to localStorage standalone) ----
const Storage = {
  async get(key) {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function') {
      try { return await window.storage.get(key); } catch (e) { /* fall through */ }
    }
    try {
      const v = localStorage.getItem(key);
      return v !== null ? { key, value: v } : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.set === 'function') {
      try { return await window.storage.set(key, value); } catch (e) { /* fall through */ }
    }
    try { localStorage.setItem(key, value); } catch (e) {}
  },
};

  if (arr.length === 1) return arr[0];
  let pool = exclude ? arr.filter(m => m.id !== exclude) : arr;
  if (pool.length === 0) pool = arr;
  return pool[Math.floor(Math.random() * pool.length)];
};

  return active.length ? active : all;

// Helper: get next-day date string
function nextDay(dateStr) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}

// Build pairs: each night weight matched with the following morning weight
function getOvernightPairs() {
  const morning = {};
  const night = {};
  state.weights.forEach(w => {
    const t = w.time || 'morning';
    if (t === 'morning') morning[w.date] = w.weight;
    else night[w.date] = w.weight;
  });
  const pairs = [];
  Object.keys(night).forEach(nightDate => {
    const morningDate = nextDay(nightDate);
    if (morning[morningDate] != null) {
      pairs.push({
        nightDate,
        morningDate,
        nightWeight: night[nightDate],
        morningWeight: morning[morningDate],
        loss: night[nightDate] - morning[morningDate],
      });
    }
  });
  // Sort newest first
  return pairs.sort((a, b) => b.nightDate.localeCompare(a.nightDate));
}

// Average overnight loss from the most recent N pairs (default 7)
function getOvernightLossAvg(maxPairs = 7) {
  const pairs = getOvernightPairs();
  if (pairs.length < MIN_PAIRS_FOR_OVERNIGHT_AVG) {
    return { value: null, pairsUsed: pairs.length, totalPairs: pairs.length };
  }
  const recent = pairs.slice(0, maxPairs);
  const avg = recent.reduce((s, p) => s + p.loss, 0) / recent.length;
  return { value: avg, pairsUsed: recent.length, totalPairs: pairs.length };
}

// Most recent morning weight (or starting weight)
function getLatestMorning() {
  const mornings = state.weights.filter(w => (w.time || 'morning') === 'morning')
    .sort((a, b) => b.date.localeCompare(a.date));
  return mornings.length > 0 ? mornings[0] : null;
}

// Most recent night weight
function getLatestNight() {
  const nights = state.weights.filter(w => w.time === 'night')
    .sort((a, b) => b.date.localeCompare(a.date));
  return nights.length > 0 ? nights[0] : null;
}

// Calculate tonight's target = latest morning + overnight loss + daily gain target
// If no overnight loss data yet, return null
function getTonightTarget() {
  const latestMorning = getLatestMorning();
  if (!latestMorning) return { value: null, reason: 'no-morning' };
  const overnight = getOvernightLossAvg();
  if (overnight.value == null) return { value: null, reason: 'no-pairs', pairsHave: overnight.totalPairs };
  const target = latestMorning.weight + overnight.value + DAILY_GAIN_TARGET;
  return {
    value: target,
    morningBase: latestMorning.weight,
    morningDate: latestMorning.date,
    overnightLoss: overnight.value,
    pairsUsed: overnight.pairsUsed,
  };
}

// Predict tomorrow morning's weight given a night weight: night - overnight loss
function predictTomorrowMorning(nightWeight) {
  const overnight = getOvernightLossAvg();
  if (overnight.value == null) return null;
  return nightWeight - overnight.value;
}

// Rolling 7-day morning gain rate (kg/day)
function getMorningGainRate() {
  const mornings = state.weights.filter(w => (w.time || 'morning') === 'morning')
    .sort((a, b) => a.date.localeCompare(b.date));
  if (mornings.length < 2) return null;
  // Use up to last 7 mornings
  const recent = mornings.slice(-7);
  const first = recent[0];
  const last = recent[recent.length - 1];
  const days = (new Date(last.date) - new Date(first.date)) / 86400000;
  if (days <= 0) return null;
  return (last.weight - first.weight) / days;
}

// ---- Init ----
async function init() {
  // Restore meal count
  const mc = await Storage.get(KEYS.mealCount);
  if (mc) state.mealCount = parseInt(mc.value, 10) || 4;

  // Restore custom meals
  const cm = await Storage.get(KEYS.custom);
  if (cm) { try { state.customMeals = JSON.parse(cm.value) || {}; } catch {} }

  // Restore disabled meals
  const dm = await Storage.get(KEYS.disabled);
  if (dm) { try { state.disabledMeals = JSON.parse(dm.value) || {}; } catch {} }

  // Restore weights
  const w = await Storage.get(KEYS.weights);
  if (w) { try { state.weights = JSON.parse(w.value); } catch {} }

  // Restore log
  const l = await Storage.get(KEYS.log);
  if (l) { try { state.mealLog = JSON.parse(l.value); } catch {} }

  // Restore or set start date
  const s = await Storage.get(KEYS.start);
  if (s) state.startDate = s.value;
  else { state.startDate = todayKey(); await Storage.set(KEYS.start, state.startDate); }

  // Restore today's plan, or generate
  const tp = await Storage.get(KEYS.todayPrefix + todayKey());
  if (tp) {
    try {
      const parsed = JSON.parse(tp.value);
      if (parsed.count === state.mealCount && parsed.plan && parsed.plan.length === CONFIGS[state.mealCount].slots.length) {
        state.todayPlan = parsed.plan;
      } else {
        state.todayPlan = generatePlan(state.mealCount);
        await savePlan();
      }
    } catch {
      state.todayPlan = generatePlan(state.mealCount);
      await savePlan();
    }
  } else {
    state.todayPlan = generatePlan(state.mealCount);
    await savePlan();
  }

  document.getElementById('app').classList.remove('loading');
  render();
}

// ---- Actions ----
async function setMealCount(count) {
  state.mealCount = count;
  state.todayPlan = generatePlan(count);
  // Reset log for today since slots changed
  const t = todayKey();
  if (state.mealLog[t]) { delete state.mealLog[t]; }
  await Storage.set(KEYS.mealCount, String(count));
  await Storage.set(KEYS.log, JSON.stringify(state.mealLog));
  await savePlan();
  render();
}

async function shuffleMeal(slotIndex) {
  const slot = CONFIGS[state.mealCount].slots[slotIndex];
  const current = state.todayPlan[slotIndex].mealId;
  const next = pickRandom(getActivePool(slot.pool), current);
  if (!next) return;
  state.todayPlan[slotIndex].mealId = next.id;
  // Uncheck this meal since it's been changed
  const t = todayKey();
  if (state.mealLog[t] && state.mealLog[t][slotIndex]) {
    state.mealLog[t][slotIndex] = false;
    await Storage.set(KEYS.log, JSON.stringify(state.mealLog));
  }
  await savePlan();
  render();
}

async function regenerateDay() {
  state.todayPlan = generatePlan(state.mealCount);
  const t = todayKey();
  if (state.mealLog[t]) { delete state.mealLog[t]; }
  await Storage.set(KEYS.log, JSON.stringify(state.mealLog));
  await savePlan();
  render();
}

// Tri-state cycle: undefined/false → 'done' → 'partial' → false
async function toggleMeal(slotIndex) {
  const t = todayKey();
  if (!state.mealLog[t]) state.mealLog[t] = {};
  const cur = state.mealLog[t][slotIndex];
  let next;
  if (!cur || cur === false) next = 'done';
  else if (cur === 'done' || cur === true) next = 'partial';
  else next = false;
  state.mealLog[t][slotIndex] = next;
  await Storage.set(KEYS.log, JSON.stringify(state.mealLog));
  render();
}

async function logWeight() {
  const num = parseFloat(state.newWeight);
  if (isNaN(num) || num <= 0) return;
  const time = state.newWeightTime || 'morning';
  // Replace any existing entry for the same date + time
  const filtered = state.weights.filter(w => !(w.date === state.newWeightDate && (w.time || 'morning') === time));
  state.weights = [...filtered, { date: state.newWeightDate, time, weight: num }]
    .sort((a, b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      // morning before night on same date
      const ta = (a.time || 'morning') === 'morning' ? 0 : 1;
      const tb = (b.time || 'morning') === 'morning' ? 0 : 1;
      return ta - tb;
    });
  state.newWeight = '';
  await Storage.set(KEYS.weights, JSON.stringify(state.weights));
  render();
}

async function removeWeight(date, time) {
  state.weights = state.weights.filter(w => !(w.date === date && (w.time || 'morning') === (time || 'morning')));
  await Storage.set(KEYS.weights, JSON.stringify(state.weights));
  render();
}

  const payload = {

async function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const d = parsed.data || parsed; // accept either wrapped or flat
      if (!d || typeof d !== 'object') throw new Error('Invalid file');
      if (!confirm('This will replace your current data with the backup. Continue?')) return;
      if (Array.isArray(d.weights)) {
        state.weights = d.weights;
        await Storage.set(KEYS.weights, JSON.stringify(state.weights));
      }
      if (d.mealLog && typeof d.mealLog === 'object') {
        state.mealLog = d.mealLog;
        await Storage.set(KEYS.log, JSON.stringify(state.mealLog));
      }
      if (d.mealCount && CONFIGS[d.mealCount]) {
        state.mealCount = d.mealCount;
        await Storage.set(KEYS.mealCount, String(state.mealCount));
      }
      if (d.startDate) {
        state.startDate = d.startDate;
        await Storage.set(KEYS.start, state.startDate);
      }
      if (d.todayPlans && d.todayPlans[todayKey()]) {
        const todayBackup = d.todayPlans[todayKey()];
        if (todayBackup.count === state.mealCount && Array.isArray(todayBackup.plan)) {
          state.todayPlan = todayBackup.plan;
          await savePlan();
        }
      }
      alert('Backup restored successfully.');
      render();
    } catch (err) {
      alert('That file does not look like a valid Gain Plan backup. Make sure you selected a .json file exported from this app.');
    }
  };
  input.click();
}

async function resetAllData() {
  const confirm1 = confirm('This will permanently delete all your weights, meal history, and start date. Continue?');
  if (!confirm1) return;
  const confirm2 = confirm('Are you absolutely sure? This cannot be undone.');
  if (!confirm2) return;
  // Reset state
  state.weights = [];
  state.mealLog = {};
  state.mealCount = 4;
  state.startDate = todayKey();
  state.todayPlan = generatePlan(state.mealCount);
  // Clear storage
  await Storage.set(KEYS.weights, JSON.stringify([]));
  await Storage.set(KEYS.log, JSON.stringify({}));
  await Storage.set(KEYS.mealCount, String(state.mealCount));
  await Storage.set(KEYS.start, state.startDate);
  await savePlan();
  render();
}

  state.editingMeal = null;

async function saveMealForm() {
  const { pool, mealId } = state.editingMeal || {};
  const dish = (state.mealForm.dish || '').trim();
  const cal = parseInt(state.mealForm.cal, 10);
  if (!dish || !cal || cal <= 0 || cal > 5000) {
    alert('Please enter a description and a calorie number between 1 and 5000.');
    return;
  }
  if (!state.customMeals[pool]) state.customMeals[pool] = [];
  if (mealId) {
    // Edit existing
    const meal = state.customMeals[pool].find(m => m.id === mealId);
    if (meal) { meal.dish = dish; meal.cal = cal; }
  } else {
    // Add new
    const newId = 'cust_' + pool + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    state.customMeals[pool].push({ id: newId, dish, cal, custom: true });
  }
  await Storage.set(KEYS.custom, JSON.stringify(state.customMeals));
  state.editingMeal = null;
  state.mealForm = { dish: '', cal: '' };
  render();

async function deleteCustomMeal(pool, mealId) {
  if (!confirm('Delete this meal? It will no longer appear in shuffles.')) return;
  if (!state.customMeals[pool]) return;
  state.customMeals[pool] = state.customMeals[pool].filter(m => m.id !== mealId);
  // Also remove from disabled list if present
  delete state.disabledMeals[mealId];
  await Storage.set(KEYS.custom, JSON.stringify(state.customMeals));
  await Storage.set(KEYS.disabled, JSON.stringify(state.disabledMeals));
  render();
}

// ---- Calendar export (.ics) for iPhone meal-time alarms ----
function generateICS() {
  const config = CONFIGS[state.mealCount];
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const stamp = `${yyyy}${mm}${dd}T${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}00`;

  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//The Gain Plan//Meal Reminders//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
  ];

  config.slots.forEach((slot, i) => {
    const [time, period] = slot.time.split(' ');
    let [h, m] = time.split(':').map(Number);
    if (period === 'PM' && h !== 12) h += 12;
    if (period === 'AM' && h === 12) h = 0;
    const hh = String(h).padStart(2, '0');
    const mn = String(m).padStart(2, '0');
    const dtstart = `${yyyy}${mm}${dd}T${hh}${mn}00`;
    const uid = `gainplan-meal-${i}-${state.mealCount}meals-${Date.now()}@local`;

    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${uid}`);
    lines.push(`DTSTAMP:${stamp}Z`);
    lines.push(`DTSTART;TZID=Africa/Lagos:${dtstart}`);
    lines.push('DURATION:PT15M');
    lines.push(`SUMMARY:🍽 ${slot.name} — Gain Plan`);
    lines.push(`DESCRIPTION:Time to eat your ${slot.name.toLowerCase()}. Open the Gain Plan app to see what's on the menu and check it off.`);
    lines.push('RRULE:FREQ=DAILY');
    lines.push('BEGIN:VALARM');
    lines.push('ACTION:DISPLAY');
    lines.push(`DESCRIPTION:Time to eat — ${slot.name}`);
    lines.push('TRIGGER:PT0M');
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function exportCalendar() {
  const ics = generateICS();
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gain-plan-meal-times-${state.mealCount}meals.ics`;
  document.body.appendChild(a);

}

// ---- Render ----
function render() {
  const app = document.getElementById('app');
  // Prefer most recent morning weight as the "official" current; fall back to most recent of any kind
  const morningEntries = state.weights.filter(w => (w.time || 'morning') === 'morning');
  const currentWeight = morningEntries.length > 0
    ? morningEntries[morningEntries.length - 1].weight
    : (state.weights.length > 0 ? state.weights[state.weights.length - 1].weight : STARTING_WEIGHT);
  const gained = (currentWeight - STARTING_WEIGHT).toFixed(1);
  const remaining = (GOAL_WEIGHT - currentWeight).toFixed(1);
  const progressPct = Math.max(0, Math.min(100, ((currentWeight - STARTING_WEIGHT) / (GOAL_WEIGHT - STARTING_WEIGHT)) * 100));
  const daysSinceStart = state.startDate ? Math.max(0, Math.floor((new Date(todayKey()) - new Date(state.startDate)) / 86400000)) : 0;
  const daysLeft = Math.max(0, PLAN_DAYS - daysSinceStart);

  const config = CONFIGS[state.mealCount];
  const todayLog = state.mealLog[todayKey()] || {};
  const mealsDone = state.todayPlan.filter((_, i) => todayLog[i]).length; // counts both 'done' and 'partial'
  const calsEaten = state.todayPlan.reduce((s, p, i) => {
    const slot = config.slots[i];
    const meal = findMeal(slot.pool, p.mealId);
    const status = todayLog[i];
    if (!meal || !status) return s;
    if (status === 'partial') return s + Math.round(meal.cal * PARTIAL_FACTOR);
    return s + meal.cal;
  }, 0);
  const calTarget = state.todayPlan.reduce((s, p, i) => {
    const slot = config.slots[i];
    const meal = findMeal(slot.pool, p.mealId);
    return s + (meal ? meal.cal : 0);
  }, 0);

  app.innerHTML = `
    <div class="container">
      <header>
        <div class="header-row">
          <h1 class="title">The Gain Plan</h1>
          <span class="subtitle">${STARTING_WEIGHT}kg → ${GOAL_WEIGHT}kg · ${PLAN_DAYS} days</span>

        <p class="tagline">A Nigerian-tailored weight gain protocol built for low appetite. Eat by the clock.</p>

      <div class="stat-grid">
        ${statCard(I.scale, 'Current Weight', currentWeight + ' kg', `${gained > 0 ? '+' : ''}${gained} kg gained`, 'accent-terra')}
        ${statCard(I.target, 'Remaining', remaining + ' kg', 'to goal', 'accent-olive')}
        ${statCard(I.cal, 'Days Left', daysLeft, `Day ${daysSinceStart + 1} of ${PLAN_DAYS}`, 'accent-tan')}
        ${statCard(I.flame, "Today's Calories", calsEaten, `/ ${calTarget} target`, 'accent-fire')}
      </div>

      <div class="progress-card">
        <div class="progress-header">
          <span class="serif" style="font-size:1.05rem;font-weight:600">Goal Progress</span>
          <span style="color:var(--tan);font-size:0.85rem">${progressPct.toFixed(1)}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>

function renderNightTargetCard() {
  const target = getTonightTarget();
  const latestNight = getLatestNight();
  const gainRate = getMorningGainRate();
  const overnight = getOvernightLossAvg();
  const todayNight = state.weights.find(w => w.date === todayKey() && w.time === 'night');

  // Empty state — not enough data yet
  if (target.value == null) {
    let message;
    if (target.reason === 'no-morning') {
      message = 'Log your first morning weight on the Progress tab to get started.';
    } else {
      const have = target.pairsHave || 0;
      const need = MIN_PAIRS_FOR_OVERNIGHT_AVG - have;
      message = `Need ${need} more night→morning pair${need === 1 ? '' : 's'} to learn your personal overnight loss. So far: ${have} pair${have === 1 ? '' : 's'}. Keep logging both morning and night weights every day.`;
    }
    return `
      <div class="night-card">
        <div class="night-card-header">${I.target} Tonight's Target</div>
        <div class="night-card-empty">
          <h4>Calibrating to your body…</h4>
          <p>${message}</p>
        </div>
      </div>
    `;
  }

  // Have a target — show it
  const targetVal = target.value.toFixed(1);
  const tomorrowMorning = target.morningBase + DAILY_GAIN_TARGET;

  let statusBlock = '';
  if (todayNight) {
    const predicted = predictTomorrowMorning(todayNight.weight);
    const diff = todayNight.weight - target.value;
    const predictedGain = predicted - target.morningBase;
    let cls, label, advice;
    if (diff >= -0.1) {
      cls = 'on-track';
      label = '✓ On track';
      advice = `You logged <strong>${todayNight.weight} kg</strong> tonight. You're predicted to wake up around <strong>${predicted.toFixed(1)} kg</strong> — that's a <strong>${predictedGain >= 0 ? '+' : ''}${predictedGain.toFixed(2)} kg</strong> gain from yesterday morning. Sleep well.`;
      if (diff >= 0.3) { cls = 'ahead'; label = '✓✓ Ahead of target'; }
    } else {
      cls = 'behind';
      label = '⚠ Behind target';
      const shortBy = Math.abs(diff).toFixed(2);
      advice = `You logged <strong>${todayNight.weight} kg</strong> tonight — short by <strong>${shortBy} kg</strong>. You're predicted to wake up around <strong>${predicted.toFixed(1)} kg</strong>, which is <strong>${(predicted - target.morningBase).toFixed(2)} kg</strong> ${predicted >= target.morningBase ? 'above' : 'below'} yesterday's morning. Add a smoothie or bedtime shake before bed if you can.`;
    }
    statusBlock = `<div class="night-status ${cls}"><strong>${label}.</strong> ${advice}</div>`;
  }

  // Gain rate strip at the bottom
  const rateText = gainRate != null
    ? `<strong>${gainRate >= 0 ? '+' : ''}${(gainRate * 1000).toFixed(0)}g/day</strong> recent gain rate`
    : `<strong>—</strong> not enough mornings yet`;
  const lossText = `<strong>${overnight.value.toFixed(2)} kg</strong> avg overnight loss <span style="opacity:0.7">(${overnight.pairsUsed} pair${overnight.pairsUsed === 1 ? '' : 's'})</span>`;

  return `
    <div class="night-card">
      <div class="night-card-header">${I.target} Tonight's Target</div>
      <div class="night-target-value">${targetVal} <span class="night-target-unit">kg</span></div>
      <div class="night-target-context">
        Hit this tonight to wake up at <strong>${tomorrowMorning.toFixed(1)} kg</strong> — that's <strong>+${DAILY_GAIN_TARGET} kg</strong> from yesterday's <strong>${target.morningBase} kg</strong>.
      </div>
      ${statusBlock}
      <div class="gain-rate-strip">
        <span>${lossText}</span>
        <span>${rateText}</span>
      </div>
    </div>
  `;
}

function renderProgress() {
  // Build two series: morning and night
  const morningData = [];
  const nightData = [];
  if (state.startDate) morningData.push({ date: state.startDate, weight: STARTING_WEIGHT });
  state.weights.forEach(w => {
    const t = w.time || 'morning';
    const point = { date: w.date, weight: w.weight };
    if (t === 'morning' && w.date !== state.startDate) morningData.push(point);
    else if (t === 'night') nightData.push(point);
    else if (t === 'morning') morningData.push(point);
  });
  const hasAnyData = morningData.length >= 2 || nightData.length >= 1;

  const config = CONFIGS[state.mealCount];
  const last7 = (() => {
    const arr = [];
    const today = new Date();
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const k = d.toISOString().slice(0, 10);
      const log = state.mealLog[k] || {};
      const total = config.slots.length;
      // Each meal counts: full=1, partial=0.5, none=0
      let score = 0;
      let fullCount = 0;
      for (let j = 0; j < total; j++) {
        const s = log[j];
        if (s === 'done' || s === true) { score += 1; fullCount += 1; }
        else if (s === 'partial') { score += 0.5; fullCount += 1; }
      }
      arr.push({ day: d.toLocaleDateString('en-US', { weekday: 'short' }), done: fullCount, score, total });
    }
    return arr;
  })();

  return `
    <div class="card">
      <div class="card-header">
        <h2>Weight Trajectory</h2>
        ${hasAnyData ? `<div style="display:flex;gap:0.75rem;font-size:0.75rem;color:var(--brown-mid)">
          <span style="display:flex;align-items:center;gap:0.3rem"><span style="width:14px;height:3px;background:var(--terracotta);border-radius:2px;display:inline-block"></span>Morning</span>
          <span style="display:flex;align-items:center;gap:0.3rem"><span style="width:14px;height:3px;background:var(--olive);border-radius:2px;display:inline-block"></span>Night</span>
        </div>` : ''}
      </div>
      ${!hasAnyData
        ? `<div class="empty-chart">Log at least one weigh-in to see your trend.</div>`
        : renderSVGChart(morningData, nightData)}
    </div>

    <div class="card">
      <h2>Last 7 Days Adherence</h2>
      <div class="adherence-grid">
        ${last7.map(d => {
          const pct = d.total > 0 ? (d.score / d.total) * 100 : 0;
          const color = pct === 100 ? 'var(--olive)' : pct >= 50 ? 'var(--terracotta)' : 'var(--tan-soft)';
          return `
            <div class="adh-day">
              <div class="adh-day-label">${d.day}</div>
              <div class="adh-bar-bg"><div class="adh-bar-fill" style="height:${pct}%;background:${color}"></div></div>
              <div class="adh-day-count">${d.score % 1 === 0 ? d.score : d.score.toFixed(1)}/${d.total}</div>
            </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <h2>Weigh-in History</h2>
      ${state.weights.length === 0
        ? `<div style="color:var(--tan);font-size:0.875rem">No entries yet.</div>`
        : (() => {
            const reversed = [...state.weights].reverse();
            return reversed.map((w, i) => {
              const t = w.time || 'morning';
              // Find the previous entry of the SAME time of day for a meaningful delta
              const prev = reversed.slice(i + 1).find(p => (p.time || 'morning') === t);
              const delta = prev ? (w.weight - prev.weight).toFixed(1) : null;
              const icon = t === 'night' ? '🌙' : '🌅';
              const label = t === 'night' ? 'Night' : 'Morning';
              return `

                    <div class="weight-date">${w.date}</div>
                  </div>

                    ${delta !== null ? `<span class="weight-delta ${parseFloat(delta) >= 0 ? 'delta-up' : 'delta-down'}">${parseFloat(delta) >= 0 ? '+' : ''}${delta} kg</span>` : ''}
                    <button class="delete-btn" data-delete="${w.date}|${t}" title="Delete entry">${I.trash}</button>

        <button class="btn btn-danger" id="reset-data">Reset everything</button>
      </details>
    </div>
  `;
}

function renderSVGChart(morningData, nightData) {
  morningData = morningData || [];
  nightData = nightData || [];
  const W = 700, H = 280;
  const pad = { l: 40, r: 20, t: 20, b: 30 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;

  // Build a sorted list of unique dates across both series for shared x-axis
  const allDates = Array.from(new Set([...morningData, ...nightData].map(d => d.date))).sort();
  if (allDates.length === 0) return '<div class="empty-chart">No data yet.</div>';

  const allWeights = [...morningData, ...nightData].map(d => d.weight);
  const minWeight = Math.floor(Math.min(STARTING_WEIGHT - 1, ...allWeights));
  const maxWeight = Math.ceil(Math.max(GOAL_WEIGHT + 1, ...allWeights));
  const yScale = w => pad.t + innerH - ((w - minWeight) / (maxWeight - minWeight)) * innerH;
  const xScale = date => {
    const idx = allDates.indexOf(date);
    if (allDates.length === 1) return pad.l + innerW / 2;
    return pad.l + (idx / (allDates.length - 1)) * innerW;
  };

  const goalY = yScale(GOAL_WEIGHT);

  const buildSeries = (data, color, isPrimary) => {
    if (!data.length) return '';
    const points = data.map(d => `${xScale(d.date)},${yScale(d.weight)}`).join(' ');
    let area = '';
    if (isPrimary && data.length > 1) {
      const areaPoints = `${xScale(data[0].date)},${pad.t + innerH} ` + points + ` ${xScale(data[data.length - 1].date)},${pad.t + innerH}`;
      area = `<polygon points="${areaPoints}" fill="url(#areaGrad)"/>`;
    }
    const dots = data.map(d => `<circle cx="${xScale(d.date)}" cy="${yScale(d.weight)}" r="4" fill="${color}"/>`).join('');
    return `${area}<polyline points="${points}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
  };

  // Y-axis labels
  const yTicks = [];
  for (let v = Math.ceil(minWeight); v <= maxWeight; v += Math.max(1, Math.floor((maxWeight - minWeight) / 5))) {
    yTicks.push(v);
  }

  return `
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%" style="overflow:visible">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c8602b" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#c8602b" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${yTicks.map(v => `
          <line x1="${pad.l}" y1="${yScale(v)}" x2="${W - pad.r}" y2="${yScale(v)}" stroke="#e8d5b7" stroke-dasharray="3 3"/>
          <text x="${pad.l - 8}" y="${yScale(v) + 4}" text-anchor="end" font-size="10" fill="#8b5e3c">${v}</text>
        `).join('')}
        <line x1="${pad.l}" y1="${goalY}" x2="${W - pad.r}" y2="${goalY}" stroke="#5c8a3a" stroke-dasharray="4 4" stroke-width="1.5"/>
        <text x="${W - pad.r}" y="${goalY - 6}" text-anchor="end" font-size="11" fill="#5c8a3a" font-weight="600">Goal ${GOAL_WEIGHT}kg</text>
        ${buildSeries(morningData, '#c8602b', true)}
        ${buildSeries(nightData, '#5c8a3a', false)}
        ${allDates.map(date => `
          <text x="${xScale(date)}" y="${H - pad.b + 18}" text-anchor="middle" font-size="10" fill="#8b5e3c">${date.slice(5)}</text>
        `).join('')}
      </svg>
    </div>
  `;
}

function renderPoolSection(pool, label) {

  return `

function mealLibraryRow(meal, isCustom, pool) {

function mealEditorForm(pool) {

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// ---- Event handlers ----
function attachHandlers() {
  document.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));
  document.querySelectorAll('[data-count]').forEach(b => b.addEventListener('click', () => setMealCount(parseInt(b.dataset.count, 10))));
  document.querySelectorAll('[data-time]').forEach(b => b.addEventListener('click', () => {
    state.newWeightTime = b.dataset.time;
    render();
  }));
  document.querySelectorAll('[data-toggle]').forEach(b => b.addEventListener('click', () => toggleMeal(parseInt(b.dataset.toggle, 10))));
  document.querySelectorAll('[data-shuffle]').forEach(b => b.addEventListener('click', () => shuffleMeal(parseInt(b.dataset.shuffle, 10))));
  document.querySelectorAll('[data-delete]').forEach(b => b.addEventListener('click', () => {
    const parts = b.dataset.delete.split('|');
    removeWeight(parts[0], parts[1] || 'morning');
  }));
  const regen = document.getElementById('regen-day');
  if (regen) regen.addEventListener('click', regenerateDay);
  const saveBtn = document.getElementById('save-weight');
  if (saveBtn) saveBtn.addEventListener('click', logWeight);
  const wInput = document.getElementById('weight-input');
  if (wInput) {
    wInput.addEventListener('input', e => state.newWeight = e.target.value);
    wInput.addEventListener('keypress', e => { if (e.key === 'Enter') logWeight(); });
  }
  const wDate = document.getElementById('weight-date');
  if (wDate) wDate.addEventListener('change', e => state.newWeightDate = e.target.value);
  const wTime = document.getElementById('weight-time');
  if (wTime) wTime.addEventListener('change', e => state.newWeightTime = e.target.value);
  const exportBtn = document.getElementById('export-data');
  if (exportBtn) exportBtn.addEventListener('click', exportData);
  const importBtn = document.getElementById('import-data');
  if (importBtn) importBtn.addEventListener('click', importData);
  const resetBtn = document.getElementById('reset-data');
  if (resetBtn) resetBtn.addEventListener('click', resetAllData);

  // Meal library handlers
  document.querySelectorAll('[data-add-meal]').forEach(b =>
    b.addEventListener('click', () => startAddMeal(b.dataset.addMeal))
  );
  document.querySelectorAll('[data-edit-meal]').forEach(b =>
    b.addEventListener('click', () => {
      const [pool, mealId] = b.dataset.editMeal.split('|');
      startEditMeal(pool, mealId);
    })
  );
  document.querySelectorAll('[data-delete-meal]').forEach(b =>
    b.addEventListener('click', () => {
      const [pool, mealId] = b.dataset.deleteMeal.split('|');
      deleteCustomMeal(pool, mealId);
    })
  );
  document.querySelectorAll('[data-toggle-hidden]').forEach(b =>
    b.addEventListener('click', () => toggleMealHidden(b.dataset.toggleHidden))
  );
  const formDish = document.getElementById('meal-form-dish');
  if (formDish) formDish.addEventListener('input', e => state.mealForm.dish = e.target.value);
  const formCal = document.getElementById('meal-form-cal');
  if (formCal) formCal.addEventListener('input', e => state.mealForm.cal = e.target.value);
  const formSave = document.getElementById('meal-form-save');
  if (formSave) formSave.addEventListener('click', saveMealForm);
  const formCancel = document.getElementById('meal-form-cancel');
  if (formCancel) formCancel.addEventListener('click', cancelMealEdit);

  // Calendar export
  const calBtn = document.getElementById('export-calendar');
  if (calBtn) calBtn.addEventListener('click', exportCalendar);
}

// Boot
init();
</script>
</body>
</html>
